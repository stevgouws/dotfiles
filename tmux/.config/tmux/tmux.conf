# match colours from terminal
set-option -sa terminal-overrides ", xterm*:Tc"
set -g mouse on

# Set prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Fast scroll in copy mode
bind-key -T copy-mode-vi K send-keys -X halfpage-up
bind-key -T copy-mode-vi J send-keys -X halfpage-down

# Start windows and panes at 1, not o
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind s display-popup -E -w 40% -h 40% -T "Sessions" "~/.config/tmux/scripts/session-switcher"
bind w display-popup -E -w 40% -h 40% -T "Windows" "~/.config/tmux/scripts/window-switcher"

# Git branch in status bar
set -g status-right '#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)'
set -g status-right-length 50
set -g status-interval 5

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
