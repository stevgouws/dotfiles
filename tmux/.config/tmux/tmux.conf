# match colours from terminal
set-option -sa terminal-overrides ", xterm*:Tc"
set -g mouse on

# Set prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Fast scroll in copy mode
bind-key -T copy-mode-vi K send-keys -X halfpage-up
bind-key -T copy-mode-vi J send-keys -X halfpage-down

# Start windows and panes at 1, not o
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Make session chooser order by name instead of session index
bind s choose-tree -sZ -O name

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# bind s display-popup -E -w 40% -h 40% -T "Sessions" "~/.config/tmux/scripts/session-switcher"
# bind w display-popup -E -w 40% -h 40% -T "Windows" "~/.config/tmux/scripts/window-switcher"

# Map custom terminal escape sequences to tmux User keys.
# These sequences are sent by Alacritty for Ctrl+Option+Shift+S/W.
set -s user-keys[0] "\033[5;30000~"
set -s user-keys[1] "\033[5;30001~"

# Open the session switcher directly, without using the tmux prefix.
bind-key -n User0 display-popup -E -w 40% -h 40% -T "Sessions" "~/.config/tmux/scripts/session-switcher"

# Open the window switcher directly, without using the tmux prefix.
bind-key -n User1 display-popup -E -w 40% -h 40% -T "Windows" "~/.config/tmux/scripts/window-switcher"

# Allow the default left status, including the session name, to use more space.
set -g status-left-length 40

# Git branch in status bar
set -g status-right '#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)'
set -g status-right-length 50
set -g status-interval 5

# Bottom status bar base colors.
set -g status-style 'bg=#a2ffb8,fg=#313244'

# Inactive windows: subtle text, no background.
set -g window-status-style 'fg=#313244,bg=default'

# Active window: bright text on a subtle surface background.
set -g window-status-current-style 'fg=#cdd6f4,bg=#313244,bold'

# Same text width for active/inactive windows, so labels do not shift.
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# # Remove decorations from window listings & add padding
# set -g window-status-format '#I:#W'
#
# # Add back current window indicator (at beginning and add padding)
# set -g window-status-current-format ' *#I:#W '

# Cmd+K clear screen (Alacritty sends prefix + K)
bind K send-keys C-l \; clear-history

# Auto reload
# Doesn't work with Bash3 see - https://github.com/b0o/tmux-autoreload/issues/3
# set -g @plugin 'b0o/tmux-autoreload'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
